name: Deploy landing page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".claude-plugin/marketplace.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject plugin version into landing page
        run: |
          VERSION=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Could not read .metadata.version from .claude-plugin/marketplace.json"
            exit 1
          fi
          echo "Marketplace version: $VERSION"
          sed -i -E "s#(<span id=\"version\">)[^<]*(</span>)#\1v${VERSION}\2#" docs/index.html
          echo "Landing page now shows: $(grep -o '<span id="version">[^<]*</span>' docs/index.html)"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

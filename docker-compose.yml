services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cr_learner
      POSTGRES_PASSWORD: cr_learner
      POSTGRES_DB: cr_learner
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cr_learner"]
      interval: 5s
      timeout: 5s
      retries: 10

  webhook:
    build: .
    command: cr-learner serve
    environment:
      DATABASE_URL: postgresql://cr_learner:cr_learner@db:5432/cr_learner
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITLAB_URL: ${GITLAB_URL:-https://gitlab.com}
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      GITLAB_PROJECT_ID: ${GITLAB_PROJECT_ID}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
